name: Build test for all platforms

on:
  push:
    paths:
      - "lib/**"
      - "linux/**"
      - "windows/**"
      - "macos/**"
      - "ios/**"
      - "android/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  check-requirements:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Check generated files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format
        run: dart format .

      - name: Check if files changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Generated files are not up to date. Please run 'dart run build_runner build --delete-conflicting-outputs' and commit the changes."
            exit 1
          fi

      - name: Check if flutter fixes are available
        run: dart fix . --dry-run | grep "Nothing to fix!" || (echo "Flutter fixes are
          available. Please run 'dart fix . --apply' and commit the changes." &&
          exit 1)

      - name: Check if errors are present
        run: |
          if flutter analyze 2>&1 | grep -q -E 'error:'; 
          then exit 1
          else exit 0
          fi

  build-linux:
    runs-on: ubuntu-latest
    needs: check-requirements
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt install -y build-essential libgtk-3-dev libgtk-3-0 libblkid1 liblzma5 libsecret-1-0 libsecret-1-dev libmpv-dev mpv

      - name: Install dependencies
        run: flutter pub get

      - name: Install dependencies
        run: |
          sudo apt install -y plocate patchelf rpm
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          mv appimagetool /usr/local/bin/
          sudo updatedb
          locate libmpv.so.2 || true

      - name: Install Fastforge
        run: |
          dart pub global activate fastforge
          export PATH="$PATH":"$HOME/.pub-cache/bin"

      - name: Build and release
        run: fastforge release --name linux

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: output/*/*.deb

      - name: Upload Linux appimage artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: output/*/*.AppImage

      #- name: Upload Linux rpm artifact
      #  uses: actions/upload-artifact@v7
      #  with:
      #    name: linux-rpm
      #    path: output/*/*.rpm

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: output/*/*.zip

  build-android:
    runs-on: ubuntu-latest
    needs: check-requirements
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Fastforge
        run: |
          dart pub global activate fastforge
          export PATH="$PATH":"$HOME/.pub-cache/bin"

      - name: Build and release
        run: fastforge release --name android

      - name: Upload Android appbundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-appbundle
          path: output/*/*.aab

      - name: Upload Android apk artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: output/*/*.apk

  build-windows:
    runs-on: windows-latest
    needs: check-requirements
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Fastforge
        run: |
          dart pub global activate fastforge
          echo "$env:LOCALAPPDATA\Pub\Cache\bin" >> $env:GITHUB_PATH

      - name: Build and release
        continue-on-error: true
        run: fastforge release --name windows

      - name: Upload Windows msix artifact
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: windows-msix
          path: output/*/*.msix

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: windows-exe
          path: output/*/*.exe

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: windows-bundle
          path: output/*/*.zip
