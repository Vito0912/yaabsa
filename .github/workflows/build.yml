name: Build test for all platforms

on:
  push:
    paths:
      - "lib/**"
      - "linux/**"
      - "windows/**"
      - "macos/**"
      - "ios/**"
      - "android/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  check-requirements:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check generated files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check if files changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Generated files are not up to date. Please run 'dart run build_runner build --delete-conflicting-outputs' and commit the changes."
            exit 1
          fi

      - name: Check if flutter fixes are available
        run: dart fix . --dry-run | grep "Nothing to fix!" || (echo "Flutter fixes are available. Please run 'dart fix . --apply' and commit the changes." && exit 1)

      - name: Check if errors are present
        run: |
          if flutter analyze 2>&1 | grep -q -E 'error:'; 
          then exit 1
          else exit 0
          fi

  build-linux:
    runs-on: ubuntu-latest
    needs: check-requirements
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt install -y build-essential libgtk-3-dev libgtk-3-0 libblkid1 liblzma5

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux debug
        run: flutter build linux

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-build-debug
          path: build/linux/x64/release/bundle

      - name: remove debug build
        run: rm -rf build/linux/x64/release/bundle

      - name: Build Linux release
        run: flutter build linux --release

      - name: Upload Linux release artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-build-release
          path: build/linux/x64/release/bundle

  build-android:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android
        run: flutter build appbundle

      - name: Build APK
        run: flutter build apk --split-per-abi

      - name: Upload Android appbundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-appbundle
          path: build/app/outputs/bundle/release/*.aab

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/apk/release/*.apk
