name: Build test for all platforms

on:
  push:
    paths:
      - "lib/**"
      - "linux/**"
      - "windows/**"
      - "android/**"
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lib: ${{ steps.filter.outputs.lib }}
      android: ${{ steps.filter.outputs.android }}
      linux: ${{ steps.filter.outputs.linux }}
      windows: ${{ steps.filter.outputs.windows }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            lib:
              - 'lib/**'
            android:
              - 'android/**'
            linux:
              - 'linux/**'
            windows:
              - 'windows/**'
            any:
              - 'lib/**'
              - 'android/**'
              - 'linux/**'
              - 'windows/**'

  check-requirements:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.any == 'true' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Check generated files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format
        run: dart format .

      - name: Check if files changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Generated files are not up to date. Please run 'dart run build_runner build --delete-conflicting-outputs' and commit the changes."
            exit 1
          fi

      - name: Check if flutter fixes are available
        run: dart fix lib/ --dry-run | grep "Nothing to fix!" || (echo "Flutter fixes are
          available. Please run 'dart fix . --apply' and commit the changes." &&
          exit 1)

      - name: Check if errors are present
        run: |
          if flutter analyze 2>&1 | grep -q -E 'error:'; 
          then exit 1
          else exit 0
          fi

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-requirements
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.linux == 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt install -y build-essential libgtk-3-dev libgtk-3-0 libblkid1 liblzma5 libsecret-1-0 libsecret-1-dev libmpv-dev mpv libayatana-appindicator3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Post Get
        uses: ./.github/actions/post-get
        with:
          flow: build-linux

      - name: Install packaging tools
        run: |
          sudo apt-get install -y patchelf dpkg-dev rpm
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Build bundle
        run: flutter build linux --release

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: build/linux/**/release/bundle/*

      - name: Build appimage
        run: bash linux/packaging/appimage/build.sh

      - name: Upload Linux appimage artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: output/linux/*.AppImage

      - name: Build deb
        run: bash linux/packaging/deb/build.sh

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: output/linux/*.deb

      - name: Build rpm
        run: bash linux/packaging/rpm/build.sh

      - name: Upload Linux rpm artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-rpm
          path: output/linux/*.rpm

  build-flatpak:
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-requirements
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.linux == 'true' }}
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Make Flutter SDK safe for git
        run: git config --global --add safe.directory "$FLUTTER_ROOT" || true

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:flatpak/stable -y
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libgtk-3-0 \
            libblkid1 \
            liblzma5 \
            libsecret-1-0 \
            libsecret-1-dev \
            libmpv-dev \
            libayatana-appindicator3-dev \
            mpv \
            flatpak \
            flatpak-builder

          flatpak-builder --version

      - name: Install dependencies
        run: flutter pub get

      - name: Post Get
        uses: ./.github/actions/post-get
        with:
          flow: build-flatpak

      - name: Build Linux bundle
        run: flutter build linux --release

      - name: Install Flatpak runtime and SDK
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Validate Flatpak signing secrets
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          if [ -z "$FLATPAK_GPG_PRIVATE_KEY" ]; then
            echo "Missing secret: FLATPAK_GPG_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "$FLATPAK_GPG_KEY_ID" ]; then
            echo "Missing secret: FLATPAK_GPG_KEY_ID"
            exit 1
          fi

      - name: Configure GPG signing key
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
          FLATPAK_GPG_PASSPHRASE: ${{ secrets.FLATPAK_GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import
          if [ -n "$FLATPAK_GPG_PASSPHRASE" ]; then
            echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
            echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
            gpgconf --kill gpg-agent
            gpgconf --launch gpg-agent
            printf 'unlock' > /tmp/gpg-unlock.txt
            gpg --batch --yes --pinentry-mode loopback --passphrase "$FLATPAK_GPG_PASSPHRASE" --local-user "$FLATPAK_GPG_KEY_ID" --output /tmp/gpg-unlock.sig --detach-sign /tmp/gpg-unlock.txt
          fi

      - name: Build Flatpak repo
        env:
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          if [ "$GITHUB_REF" = "refs/heads/master" ]; then
            flatpak-builder --user --install-deps-from=flathub --force-clean --repo=flatpak-repo --default-branch=master --gpg-sign="$FLATPAK_GPG_KEY_ID" flatpak-build linux/packaging/flatpak/de.vito0912.yaabsa.yml
          else
            flatpak-builder --user --install-deps-from=flathub --force-clean --repo=flatpak-repo --default-branch=master flatpak-build linux/packaging/flatpak/de.vito0912.yaabsa.yml
          fi
          if ! find flatpak-build/files -maxdepth 5 -type f -name 'libmpv.so*' | grep -q .; then
            echo "libmpv was not bundled into the Flatpak image."
            exit 1
          fi

      - name: Finalize signed Flatpak repo
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: flatpak build-update-repo --gpg-sign="$FLATPAK_GPG_KEY_ID" --generate-static-deltas --prune flatpak-repo

      - name: Build Flatpak bundle for master
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: flatpak build-bundle --gpg-sign="$FLATPAK_GPG_KEY_ID" flatpak-repo de.vito0912.yaabsa.flatpak de.vito0912.yaabsa master

      - name: Build Flatpak bundle for non-master
        if: github.ref != 'refs/heads/master'
        run: flatpak build-bundle flatpak-repo de.vito0912.yaabsa.flatpak de.vito0912.yaabsa master

      - name: Prepare GitHub Pages content
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          HOMEPAGE_URL="https://github.com/${REPO_SLUG}"
          ICON_URL="https://raw.githubusercontent.com/${REPO_SLUG}/master/assets/logo_blue_fill.svg"
          GPG_KEY_B64="$(gpg --export "$FLATPAK_GPG_KEY_ID" | base64 -w 0)"
          mkdir -p flatpak-pages
          cp -R flatpak-repo/. flatpak-pages/
          cp linux/packaging/flatpak/de.vito0912.yaabsa.flatpakrepo flatpak-pages/de.vito0912.yaabsa.flatpakrepo
          sed -i \
            -e "s|__REPO_URL__|${PAGES_URL}|g" \
            -e "s|__HOMEPAGE_URL__|${HOMEPAGE_URL}|g" \
            -e "s|__ICON_URL__|${ICON_URL}|g" \
            -e "s|__GPG_KEY__|${GPG_KEY_B64}|g" \
            flatpak-pages/de.vito0912.yaabsa.flatpakrepo

      - name: Upload Flatpak Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: flatpak-pages

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-flatpak
          path: de.vito0912.yaabsa.flatpak

  deploy-flatpak-pages:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-slim
    needs:
      - build-flatpak
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy Flatpak Pages
        id: deploy
        uses: actions/deploy-pages@v5

  build-snap:
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-requirements
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.linux == 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Snap
        id: build
        uses: snapcore/action-build@v1

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-snap
          path: ${{ steps.build.outputs.snap }}

  build-android:
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-requirements
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.android == 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Post Get
        uses: ./.github/actions/post-get
        with:
          flow: build-android

      - name: Setup Keystore
        run: printf '%s' "${{ secrets.STORE }}" | base64 -d > android/keystore.jks

      - name: Build Android Auto appbundle
        run: |
          flutter build appbundle --flavor auto --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android Auto APKs
        run: |
          flutter build apk --split-per-abi --flavor auto --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android Automotive appbundle
        run: |
          flutter build appbundle --flavor automotive --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android Automotive apk
        run: |
          flutter build apk --flavor automotive --release --split-per-abi
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Android appbundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-appbundle
          path: build/app/outputs/bundle/autoRelease/*.aab

      - name: Upload Android apk artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*auto-release*.apk

      - name: Upload Android Automotive appbundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-automotive-appbundle
          path: build/app/outputs/bundle/automotiveRelease/*.aab

      - name: Upload Android Automotive apk artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-automotive-apk
          path: build/app/outputs/flutter-apk/*automotive-release*.apk

      - name: Clean up
        if: always()
        run: |
          sudo rm -rf build
          sudo rm -rf android/keystore.jks

  build-windows:
    runs-on: windows-latest
    needs:
      - changes
      - check-requirements
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.windows == 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Post Get
        uses: ./.github/actions/post-get
        with:
          flow: build-windows

      - name: Install packaging tools
        run: |
          dart pub global activate msix
          echo "$env:LOCALAPPDATA\Pub\Cache\bin" >> $env:GITHUB_PATH

      - name: Build Windows bundle
        run: flutter build windows --release

      - name: Build exe installer
        run: pwsh -File windows/packaging/exe/build.ps1

      - name: Build msix installer
        run: pwsh -File windows/packaging/msix/build.ps1

      - name: Build Windows bundle zip
        run: |
          if (Test-Path "build/windows/x64/runner/Release") {
            $bundleDir = "build/windows/x64/runner/Release"
          } elseif (Test-Path "build/windows/runner/Release") {
            $bundleDir = "build/windows/runner/Release"
          } else {
            throw "Windows release bundle not found."
          }
          New-Item -ItemType Directory -Path "output/windows" -Force | Out-Null
          Compress-Archive -Path "$bundleDir/*" -DestinationPath "output/windows/yaabsa-windows-bundle.zip" -Force

      - name: Upload Windows msix artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-msix
          path: output/windows/*.msix

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: output/windows/*.exe

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-bundle
          path: output/windows/*.zip
