name: Build test for all platforms

on:
  push:
    paths:
      - "lib/**"
      - "linux/**"
      - "windows/**"
      - "android/**"
      - "pubspec.yaml"
  workflow_dispatch:
    inputs:
      force_version_bump:
        description: "Treat current pubspec version as bumped"
        required: false
        type: boolean
        default: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lib: ${{ steps.filter.outputs.lib }}
      android: ${{ steps.filter.outputs.android }}
      linux: ${{ steps.filter.outputs.linux }}
      windows: ${{ steps.filter.outputs.windows }}
      pubspec: ${{ steps.filter.outputs.pubspec }}
      any: ${{ steps.filter.outputs.any }}
      build_skip: ${{ steps.build_skip.outputs.build_skip }}
      version_bumped: ${{ steps.version.outputs.version_bumped }}
      force_version_bump: ${{ steps.version.outputs.force_version_bump }}
      app_version: ${{ steps.version.outputs.app_version }}
      previous_app_version: ${{ steps.version.outputs.previous_app_version }}
      file_version: ${{ steps.version.outputs.file_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            lib:
              - 'lib/**'
            android:
              - 'android/**'
            linux:
              - 'linux/**'
            windows:
              - 'windows/**'
            pubspec:
              - 'pubspec.yaml'
            any:
              - 'lib/**'
              - 'android/**'
              - 'linux/**'
              - 'windows/**'
              - 'pubspec.yaml'

      - name: Detect build skip flag from commit message
        id: build_skip
        shell: bash
        run: |
          set -euo pipefail

          build_skip="false"
          commit_messages=""
          base_ref="${{ github.event.before }}"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ -n "$base_ref" && "$base_ref" != "0000000000000000000000000000000000000000" ]]; then
              commit_messages="$(git log --format=%B "$base_ref..${{ github.sha }}" || true)"
            fi

            if [[ -z "$commit_messages" ]]; then
              commit_messages="$(git log -1 --format=%B || true)"
            fi
          fi

          if [[ -n "$commit_messages" ]]; then
            lower_messages="$(printf '%s' "$commit_messages" | tr '[:upper:]' '[:lower:]')"
            if [[ "$lower_messages" == *"build skip"* ]]; then
              build_skip="true"
            fi
          fi

          echo "build_skip=$build_skip" >> "$GITHUB_OUTPUT"
          echo "Build skip requested: $build_skip"

          if [[ "$build_skip" == "true" ]]; then
            echo "Running just requirements"
          fi

      - name: Detect pubspec version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(awk '/^version:/ {print $2; exit}' pubspec.yaml || true)"
          if [[ -z "$current_version" ]]; then
            echo "Unable to detect current pubspec version from pubspec.yaml"
            exit 1
          fi

          previous_version=""
          base_ref="${{ github.event.before }}"

          if [[ "${{ github.event_name }}" == "push" && -n "$base_ref" && "$base_ref" != "0000000000000000000000000000000000000000" ]]; then
            previous_version="$(git show "$base_ref":pubspec.yaml 2>/dev/null | awk '/^version:/ {print $2; exit}' || true)"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            previous_version="$(git show HEAD^:pubspec.yaml 2>/dev/null | awk '/^version:/ {print $2; exit}' || true)"
          fi

          version_bumped="false"
          if [[ -n "$current_version" && -n "$previous_version" && "$current_version" != "$previous_version" ]]; then
            version_bumped="true"
          fi

          force_version_bump="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_version_bump || 'false' }}"
          if [[ "$force_version_bump" == "true" ]]; then
            version_bumped="true"
          fi

          version_without_build="${current_version%%+*}"
          file_version="v${version_without_build}"
          release_tag="${file_version}-pre"

          echo "app_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_app_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "version_bumped=$version_bumped" >> "$GITHUB_OUTPUT"
          echo "force_version_bump=$force_version_bump" >> "$GITHUB_OUTPUT"
          echo "file_version=$file_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

          echo "Detected version: '$current_version' (previous: '$previous_version')"
          echo "File version label: $file_version"
          echo "Force version bump override: $force_version_bump"
          echo "Version bumped: $version_bumped"

  check-requirements:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.any == 'true' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # For context for contributors:
      # The flatpak run depends on the launchpad PPA, because Ubuntu 24.04 does not ship with the latest flatpak-builder
      # Thus the PPA repo is needed. At the time of writing (05.05.2026) Canonical has massive issues with providing stable connection
      # For now over 4 days. To not spend useless resources, this check needs to be passed before doing anything else.
      # Once GitHub runners support Ubuntu 26 this is not required anymore. The addition of the ppa should then also be removed from that build step
      - name: Check if launchpad is reachable
        run: |
          if ! curl -sSf https://ppa.launchpadcontent.net/flatpak/stable/ubuntu > /dev/null; then
            echo "Launchpad API is not reachable"
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib

      - name: Check generated files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format
        run: dart format lib

      - name: Check if files changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Generated files are not up to date. Please run 'dart run build_runner build --delete-conflicting-outputs' and commit the changes."
            exit 1
          fi

      - name: Check if flutter fixes are available
        run: dart fix lib/ --dry-run | grep "Nothing to fix!" || (echo "Flutter fixes are
          available. Please run 'dart fix . --apply' and commit the changes." &&
          exit 1)

      - name: Check if errors are present
        run: flutter analyze lib | grep "No issues found!" || (echo "Analyzer found issues in yaabsa sources. Please fix them and commit the changes." && exit 1)

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-requirements
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.version_bumped == 'true' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.linux == 'true') && needs.changes.outputs.build_skip != 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt install -y build-essential libgtk-3-dev libgtk-3-0 libblkid1 liblzma5 libsecret-1-0 libsecret-1-dev libmpv-dev mpv libayatana-appindicator3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Post Get
        uses: ./.github/actions/post-get
        with:
          flow: build-linux

      - name: Install packaging tools
        run: |
          sudo apt-get install -y patchelf dpkg-dev rpm
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Build bundle
        run: flutter build linux --release

      - name: Package Linux bundle artifact
        shell: bash
        env:
          FILE_VERSION: ${{ needs.changes.outputs.file_version }}
        run: |
          set -euo pipefail

          bundle_dir="$(find build/linux -type d -path '*/release/bundle' | head -n 1)"
          if [[ -z "$bundle_dir" ]]; then
            echo "Linux release bundle directory not found."
            exit 1
          fi

          mkdir -p output/linux
          tar -C "$bundle_dir" -czf "output/linux/yaabsa_${FILE_VERSION}.tar.gz" .

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: output/linux/yaabsa_*.tar.gz

      - name: Build appimage
        run: bash linux/packaging/appimage/build.sh

      - name: Rename Linux appimage artifact
        shell: bash
        env:
          FILE_VERSION: ${{ needs.changes.outputs.file_version }}
        run: |
          set -euo pipefail

          appimage_file="$(find output/linux -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          if [[ -z "$appimage_file" ]]; then
            echo "Linux AppImage artifact not found."
            exit 1
          fi

          mv "$appimage_file" "output/linux/yaabsa_${FILE_VERSION}.AppImage"

      - name: Upload Linux appimage artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: output/linux/yaabsa_*.AppImage

      - name: Build deb
        run: bash linux/packaging/deb/build.sh

      - name: Rename Linux deb artifact
        shell: bash
        env:
          FILE_VERSION: ${{ needs.changes.outputs.file_version }}
        run: |
          set -euo pipefail

          deb_file="$(find output/linux -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          if [[ -z "$deb_file" ]]; then
            echo "Linux deb artifact not found."
            exit 1
          fi

          mv "$deb_file" "output/linux/yaabsa_${FILE_VERSION}.deb"

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: output/linux/yaabsa_*.deb

      - name: Build rpm
        run: bash linux/packaging/rpm/build.sh

      - name: Rename Linux rpm artifact
        shell: bash
        env:
          FILE_VERSION: ${{ needs.changes.outputs.file_version }}
        run: |
          set -euo pipefail

          rpm_file="$(find output/linux -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
          if [[ -z "$rpm_file" ]]; then
            echo "Linux rpm artifact not found."
            exit 1
          fi

          mv "$rpm_file" "output/linux/yaabsa_${FILE_VERSION}.rpm"

      - name: Upload Linux rpm artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-rpm
          path: output/linux/yaabsa_*.rpm

  build-flatpak:
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-requirements
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.version_bumped == 'true' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.linux == 'true') && needs.changes.outputs.build_skip != 'true' }}
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Add flatpak repo
        run: |
          sudo add-apt-repository ppa:flatpak/stable -y

      - name: Update apt
        run: |
          sudo apt-get update

      - name: Install apt dependencies
        run: |
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libgtk-3-0 \
            libblkid1 \
            liblzma5 \
            libsecret-1-0 \
            libsecret-1-dev \
            libmpv-dev \
            libayatana-appindicator3-dev \
            mpv \
            flatpak \
            flatpak-builder

          flatpak-builder --version

      - name: Install dependencies
        run: flutter pub get

      - name: Post Get
        uses: ./.github/actions/post-get
        with:
          flow: build-flatpak

      - name: Build Linux bundle
        run: flutter build linux --release

      - name: Install Flatpak runtime and SDK
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Validate Flatpak signing secrets
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          if [ -z "$FLATPAK_GPG_PRIVATE_KEY" ]; then
            echo "Missing secret: FLATPAK_GPG_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "$FLATPAK_GPG_KEY_ID" ]; then
            echo "Missing secret: FLATPAK_GPG_KEY_ID"
            exit 1
          fi

      - name: Configure GPG signing key
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
          FLATPAK_GPG_PASSPHRASE: ${{ secrets.FLATPAK_GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import
          if [ -n "$FLATPAK_GPG_PASSPHRASE" ]; then
            echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
            echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
            echo "default-cache-ttl 7200" >> ~/.gnupg/gpg-agent.conf
            echo "max-cache-ttl 7200" >> ~/.gnupg/gpg-agent.conf
            gpgconf --kill gpg-agent
            gpgconf --launch gpg-agent
            printf 'unlock' > /tmp/gpg-unlock.txt
            gpg --batch --yes --pinentry-mode loopback --passphrase "$FLATPAK_GPG_PASSPHRASE" --local-user "$FLATPAK_GPG_KEY_ID" --output /tmp/gpg-unlock.sig --detach-sign /tmp/gpg-unlock.txt
          fi

      - name: Build Flatpak repo
        env:
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          if [ "$GITHUB_REF" = "refs/heads/master" ]; then
            flatpak-builder --user --install-deps-from=flathub --force-clean --repo=flatpak-repo --default-branch=master --gpg-sign="$FLATPAK_GPG_KEY_ID" flatpak-build linux/packaging/flatpak/de.vito0912.yaabsa.yml
          else
            flatpak-builder --user --install-deps-from=flathub --force-clean --repo=flatpak-repo --default-branch=master flatpak-build linux/packaging/flatpak/de.vito0912.yaabsa.yml
          fi
          if ! find flatpak-build/files -maxdepth 5 -type f -name 'libmpv.so*' | grep -q .; then
            echo "libmpv was not bundled into the Flatpak image."
            exit 1
          fi

      - name: Finalize signed Flatpak repo
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: flatpak build-update-repo --gpg-sign="$FLATPAK_GPG_KEY_ID" --generate-static-deltas --prune flatpak-repo

      - name: Build Flatpak bundle for master
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: flatpak build-bundle --gpg-sign="$FLATPAK_GPG_KEY_ID" flatpak-repo de.vito0912.yaabsa.flatpak de.vito0912.yaabsa master

      - name: Build Flatpak bundle for non-master
        if: github.ref != 'refs/heads/master'
        run: flatpak build-bundle flatpak-repo de.vito0912.yaabsa.flatpak de.vito0912.yaabsa master

      - name: Prepare GitHub Pages content
        if: github.ref == 'refs/heads/master'
        env:
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          HOMEPAGE_URL="https://github.com/${REPO_SLUG}"
          ICON_URL="https://raw.githubusercontent.com/${REPO_SLUG}/master/assets/logo_blue_fill.svg"
          GPG_KEY_B64="$(gpg --export "$FLATPAK_GPG_KEY_ID" | base64 -w 0)"
          mkdir -p flatpak-pages
          cp -R flatpak-repo/. flatpak-pages/
          cp linux/packaging/flatpak/de.vito0912.yaabsa.flatpakrepo flatpak-pages/de.vito0912.yaabsa.flatpakrepo
          sed -i \
            -e "s|__REPO_URL__|${PAGES_URL}|g" \
            -e "s|__HOMEPAGE_URL__|${HOMEPAGE_URL}|g" \
            -e "s|__ICON_URL__|${ICON_URL}|g" \
            -e "s|__GPG_KEY__|${GPG_KEY_B64}|g" \
            flatpak-pages/de.vito0912.yaabsa.flatpakrepo

      - name: Upload Flatpak Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: flatpak-pages

      - name: Rename Flatpak artifact
        shell: bash
        env:
          FILE_VERSION: ${{ needs.changes.outputs.file_version }}
        run: |
          set -euo pipefail

          if [[ ! -f de.vito0912.yaabsa.flatpak ]]; then
            echo "Flatpak bundle not found."
            exit 1
          fi

          mkdir -p output/linux
          mv de.vito0912.yaabsa.flatpak "output/linux/yaabsa_${FILE_VERSION}.flatpak"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-flatpak
          path: output/linux/yaabsa_*.flatpak

  deploy-flatpak-pages:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-slim
    needs:
      - build-flatpak
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy Flatpak Pages
        id: deploy
        uses: actions/deploy-pages@v5

  build-snap:
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-requirements
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.version_bumped == 'true' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.linux == 'true') && needs.changes.outputs.build_skip != 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Snap
        id: build
        uses: snapcore/action-build@v1

      - name: Rename Snap artifact
        shell: bash
        env:
          FILE_VERSION: ${{ needs.changes.outputs.file_version }}
        run: |
          set -euo pipefail

          snap_file="${{ steps.build.outputs.snap }}"
          if [[ -z "$snap_file" || ! -f "$snap_file" ]]; then
            echo "Snap artifact not found at '$snap_file'."
            exit 1
          fi

          mkdir -p output/linux
          cp "$snap_file" "output/linux/yaabsa_${FILE_VERSION}.snap"

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-snap
          path: output/linux/yaabsa_*.snap

  build-android:
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-requirements
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.version_bumped == 'true' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.android == 'true') && needs.changes.outputs.build_skip != 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Post Get
        uses: ./.github/actions/post-get
        with:
          flow: build-android

      - name: Setup Keystore
        run: printf '%s' "${{ secrets.STORE }}" | base64 -d > android/keystore.jks

      - name: Build Android Auto appbundle
        run: |
          flutter build appbundle --flavor auto --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android Auto APKs
        run: |
          flutter build apk --split-per-abi --flavor auto --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android Automotive appbundle
        run: |
          flutter build appbundle --flavor automotive --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android Automotive apk
        run: |
          flutter build apk --flavor automotive --release --split-per-abi
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename Android artifacts
        shell: bash
        env:
          FILE_VERSION: ${{ needs.changes.outputs.file_version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p output/android/auto
          mkdir -p output/android/aaos

          auto_bundle_candidates=(build/app/outputs/bundle/autoRelease/*.aab)
          if [[ ${#auto_bundle_candidates[@]} -eq 0 ]]; then
            echo "Android Auto app bundle not found."
            exit 1
          fi
          cp "${auto_bundle_candidates[0]}" "output/android/auto/yaabsa_${FILE_VERSION}.aab"

          auto_apk_candidates=(build/app/outputs/flutter-apk/*auto-release*.apk)
          if [[ ${#auto_apk_candidates[@]} -eq 0 ]]; then
            echo "Android Auto APK artifacts not found."
            exit 1
          fi
          for apk in "${auto_apk_candidates[@]}"; do
            base_name="$(basename "$apk")"
            platform="${base_name#app-auto-}"
            platform="${platform%-release.apk}"
            cp "$apk" "output/android/auto/yaabsa_${platform}_${FILE_VERSION}.apk"
          done

          aaos_bundle_candidates=(build/app/outputs/bundle/automotiveRelease/*.aab)
          if [[ ${#aaos_bundle_candidates[@]} -eq 0 ]]; then
            echo "Android Automotive app bundle not found."
            exit 1
          fi
          cp "${aaos_bundle_candidates[0]}" "output/android/aaos/yaabsa_AAOS_${FILE_VERSION}.aab"

          aaos_apk_candidates=(build/app/outputs/flutter-apk/*automotive-release*.apk)
          if [[ ${#aaos_apk_candidates[@]} -eq 0 ]]; then
            echo "Android Automotive APK artifacts not found."
            exit 1
          fi
          for apk in "${aaos_apk_candidates[@]}"; do
            base_name="$(basename "$apk")"
            platform="${base_name#app-automotive-}"
            platform="${platform%-release.apk}"
            cp "$apk" "output/android/aaos/yaabsa_AAOS_${platform}_${FILE_VERSION}.apk"
          done

      - name: Upload Android appbundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-appbundle
          path: output/android/auto/*.aab

      - name: Upload Android apk artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: output/android/auto/*.apk

      - name: Upload Android Automotive appbundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-automotive-appbundle
          path: output/android/aaos/*.aab

      - name: Upload Android Automotive apk artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-automotive-apk
          path: output/android/aaos/*.apk

      - name: Clean up
        if: always()
        run: |
          sudo rm -rf build
          sudo rm -rf android/keystore.jks

  build-windows:
    runs-on: windows-latest
    needs:
      - changes
      - check-requirements
    if: ${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.version_bumped == 'true' || needs.changes.outputs.lib == 'true' || needs.changes.outputs.windows == 'true') && needs.changes.outputs.build_skip != 'true' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Post Get
        uses: ./.github/actions/post-get
        with:
          flow: build-windows

      - name: Install packaging tools
        run: |
          dart pub global activate msix
          echo "$env:LOCALAPPDATA\Pub\Cache\bin" >> $env:GITHUB_PATH

      - name: Build Windows bundle
        run: flutter build windows --release

      - name: Build exe installer
        run: pwsh -File windows/packaging/exe/build.ps1

      - name: Build msix installer
        run: pwsh -File windows/packaging/msix/build.ps1

      - name: Build Windows bundle zip
        run: |
          if (Test-Path "build/windows/x64/runner/Release") {
            $bundleDir = "build/windows/x64/runner/Release"
          } elseif (Test-Path "build/windows/runner/Release") {
            $bundleDir = "build/windows/runner/Release"
          } else {
            throw "Windows release bundle not found."
          }
          New-Item -ItemType Directory -Path "output/windows" -Force | Out-Null
          Compress-Archive -Path "$bundleDir/*" -DestinationPath "output/windows/windows-bundle.zip" -Force

      - name: Rename Windows artifacts
        shell: pwsh
        env:
          FILE_VERSION: ${{ needs.changes.outputs.file_version }}
        run: |
          $msix = Get-ChildItem -Path "output/windows" -Filter "*.msix" | Select-Object -First 1
          if (-not $msix) {
            throw "Windows msix artifact not found."
          }
          Move-Item -Path $msix.FullName -Destination ("output/windows/yaabsa_{0}.msix" -f $env:FILE_VERSION) -Force

          $exe = Get-ChildItem -Path "output/windows" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "Windows exe artifact not found."
          }
          Move-Item -Path $exe.FullName -Destination ("output/windows/yaabsa_{0}.exe" -f $env:FILE_VERSION) -Force

          $bundleZip = Get-Item "output/windows/windows-bundle.zip" -ErrorAction SilentlyContinue
          if (-not $bundleZip) {
            throw "Windows bundle zip not found."
          }
          Move-Item -Path $bundleZip.FullName -Destination ("output/windows/yaabsa_{0}.zip" -f $env:FILE_VERSION) -Force

      - name: Upload Windows msix artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-msix
          path: output/windows/yaabsa_*.msix

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: output/windows/yaabsa_*.exe

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-bundle
          path: output/windows/yaabsa_*.zip

  create-prerelease:
    runs-on: ubuntu-slim
    needs:
      - changes
      - build-linux
      - build-flatpak
      - build-snap
      - build-android
      - build-windows
    if: ${{ needs.changes.outputs.version_bumped == 'true' && needs.changes.outputs.build_skip != 'true' }}
    permissions:
      contents: write
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          while IFS= read -r -d '' file; do
            file_name="$(basename "$file")"
            artifact_key="$(basename "$(dirname "$file")")"

            if [[ "$artifact_key" == "github-pages" ]]; then
              continue
            fi

            target_name="${artifact_key}-${file_name}"
            target_file="dist/$target_name"
            if [[ -e "$target_file" ]]; then
              echo "Duplicate release asset name found: $target_name"
              exit 1
            fi
            cp "$file" "$target_file"
          done < <(find release-assets -type f -print0)

          ls -lh dist

      - name: Create prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.changes.outputs.release_tag }}
          name: ${{ needs.changes.outputs.release_tag }}
          prerelease: true
          overwrite_files: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            This pre-release has been automatically generated from commit ${{ github.sha }}.

            You can download the built artifacts from the "Assets" section below.
          files: |
            dist/*

  publish-android:
    runs-on: ubuntu-slim
    needs: create-prerelease
    if: ${{ needs.changes.outputs.version_bumped == 'true' && needs.changes.outputs.build_skip != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Android artifacts
        uses: actions/download-artifact@v8
        with:
          name: android-appbundle
          path: android-release

      - name: Download Android Automotive artifacts
        uses: actions/download-artifact@v8
        with:
          name: android-automotive-appbundle
          path: android-automotive-release

      - name: Move files
        run: |
          mv android-release/*.aab android-release/yaabsa.aab
          mv android-automotive-release/*.aab android-automotive-release/yaabsa_aaos.aab

      - name: Publish Android appbundle to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: de.vito0912.yaabsa
          releaseFile: android-release/yaabsa.aab
          track: qa
          releaseName: ${{ needs.changes.outputs.release_tag }}
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: android/whatsnew

      - name: Publish Android Automotive appbundle to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: de.vito0912.yaabsa
          releaseFile: android-automotive-release/yaabsa_aaos.aab
          track: automotive:qa
          releaseName: ${{ needs.changes.outputs.release_tag }} AAOS
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: android/whatsnew