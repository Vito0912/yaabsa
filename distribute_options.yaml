output: output/
releases:
  - name: linux
    jobs:
      - name: release-linux-deb
        package:
          platform: linux
          target: deb
      - name: release-linux-appimage
        package:
          platform: linux
          target: appimage
      # RPM broken: https://github.com/fastforgedev/fastforge/issues/235
      # - name: release-linux-rpm
      #  package:
      #    platform: linux
      #    target: rpm
      - name: release-linux-bundle
        package:
          platform: linux
          target: zip

  - name: android
    jobs:
      - name: release-android-appbundle
        package:
          platform: android
          target: aab
      - name: release-android-apk
        package:
          platform: android
          split-per-abi:
          target: apk

  - name: windows
    jobs:
      - name: release-windows-msix
        package:
          platform: windows
          target: msix
      - name: release-windows-exe
        package:
          platform: windows
          target: exe
      - name: release-windows-bundle
        package:
          platform: windows
          target: zip