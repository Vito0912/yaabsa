name: yaabsa
description: "An improved cross-platform app for Audiobookshelf"
publish_to: 'none'

version: 1.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_staggered_grid_view: ^0.7.0

  # Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  riverpod_annotation: ^4.0.2


  # Misc
  uuid: ^4.5.3
  intl: ^0.20.2

  sembast: ^3.8.6

  # Core
  just_audio: ^0.10.5 # Should be setup for Android, Windows, iOS, macOS, Linux | Testing needed for iOS, macOS, Linux | https://pub.dev/packages/just_audio
  audio_service: ^0.18.18 # Should be setup for Android, Windows, iOS | Testing needed for iOS, macOS | for macOS pod is needed platform :osx, '10.12.2' | https://pub.dev/packages/audio_service
  dio: ^5.9.2
  crypto: ^3.0.7
  drift: ^2.31.0
  path_provider: ^2.1.5
  sqlite3: ^3.2.0
  cached_network_image: ^3.4.1
  go_router: ^17.1.0

  hooks_riverpod: ^3.3.1
  flutter_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  flutter_secure_storage: ^10.0.0
  rxdart: ^0.28.0
  background_downloader: ^9.5.4 # iOS needs background fetch | Testing needed for iOS, Android | https://pub.dev/packages/background_downloader

  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  sensors_plus: ^7.0.0 # Should be setup for Android, iOS, macOS, Windows | Testing needed for iOS, macOS, Windows | https://pub.dev/packages/sensors_plus
  vibration: ^3.1.8

  # Note for contributors: Commit pinning is used. Please check for updates when updating the e-Reader. This is for security, as it runs in a WebView and the repository is very small.
  flutter_epub_reader:
    git:
      url: https://github.com/chandrabezzo/epub_viewer.git
      ref: db2bab1bf511e4191a362014dbfc3067a16dd220

  ## Platform
  just_audio_media_kit: ^2.1.0

  ## Windows
  media_kit_libs_windows_audio: any

  ## Linux
  audio_service_mpris: ^0.2.1 # Needs to be tested
  media_kit_libs_linux: any

  ## MacOS

  ## iOS

  ## Android

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.12.0
  drift_dev: ^2.31.0
  riverpod_generator: ^4.0.3

dependency_overrides:
  sqlite3: ^3.2.0

flutter:
  uses-material-design: true
